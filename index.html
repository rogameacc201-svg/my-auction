<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🏆 輕鬆玩天堂-拍賣行</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>

    <style>
        :root { --gold: #ffcc00; --bg: #121212; --card: #1e1e1e; --red: #ff4444; --nav-h: 70px; --green: #00ff88; }
        * { box-sizing: border-box; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; padding: 0; }

        /* 頂部至頂廣播 */
        header {
            height: var(--nav-h); background: #000; border-bottom: 2px solid var(--gold);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            position: sticky; top: 0; z-index: 1500;
        }
        header h1 { margin: 0; font-size: 18px; color: var(--gold); letter-spacing: 2px; }
        #top-broadcast { font-size: 14px; color: var(--red); font-weight: bold; margin-top: 5px; }

        /* 登入介面 */
        #login-screen { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
        .login-box { width: 100%; max-width: 320px; display: flex; flex-direction: column; gap: 10px; }

        /* 主佈局容器 */
        #main-app { display: none; flex-wrap: wrap; padding: 15px; gap: 15px; justify-content: center; }
        
        /* 🚩 左側欄：整合玩家與聊天 */
        .sidebar-left { width: 100%; max-width: 300px; display: flex; flex-direction: column; gap: 15px; }
        .user-panel { background: var(--card); border-radius: 12px; border: 1px solid #333; height: 180px; display: flex; flex-direction: column; overflow: hidden; }
        .chat-panel { background: var(--card); border-radius: 12px; border: 1px solid #333; height: 350px; display: flex; flex-direction: column; overflow: hidden; }

        /* 🚩 右側：成交歷史 */
        .history-panel { width: 100%; max-width: 300px; background: var(--card); border-radius: 12px; border: 1px solid #333; height: 545px; display: flex; flex-direction: column; overflow: hidden; }

        /* 🚩 中間：拍賣核心 */
        .auction-container { flex: 1; min-width: 320px; max-width: 500px; display: flex; flex-direction: column; gap: 10px; }

        /* 滾動區域優化 */
        .scroll-area { flex: 1; overflow-y: auto; padding: 10px; scroll-behavior: smooth; }
        .scroll-area::-webkit-scrollbar { width: 5px; }
        .scroll-area::-webkit-scrollbar-thumb { background: #444; border-radius: 10px; }

        /* 內容樣式 */
        .panel-title { padding: 10px; background: #000; font-size: 12px; color: var(--gold); border-bottom: 1px solid #333; font-weight: bold; }
        .history-item { background: #252525; padding: 8px; border-radius: 6px; margin-bottom: 6px; border-left: 3px solid var(--green); font-size: 12px; }
        .msg-line { font-size: 13px; margin-bottom: 5px; border-bottom: 1px solid #222; padding-bottom: 3px; }

        .auction-card { background: var(--card); padding: 25px; border-radius: 20px; text-align: center; border: 1px solid #444; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .timer { font-size: 45px; color: var(--red); font-family: monospace; background: #000; margin: 15px 0; border-radius: 10px; border: 1px solid #333; padding: 10px; }
        .price-tag { font-size: 30px; color: var(--green); font-weight: bold; margin-bottom: 10px; }
        
        input { padding: 12px; border-radius: 8px; border: 1px solid #444; background: #222; color: white; width: 100%; font-size: 15px; }
        .btn { padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-gold { background: var(--gold); color: black; }
        .btn-blue { background: #0088ff; color: white; margin-top: 8px; width: 100%; }

        @media (min-width: 1200px) {
            #main-app { flex-wrap: nowrap; }
        }
    </style>
</head>
<body>

    <header>
        <h1>🏆 輕鬆玩天堂-拍賣行</h1>
        <div id="top-broadcast">請等待開標...</div>
    </header>

    <div id="login-screen">
        <h1 style="color: var(--gold);">🏆 輕鬆玩天堂-拍賣行</h1>
        <div class="login-box">
            <button class="btn" style="background:white; color:#333;" onclick="loginWithGoogle()">Google 帳號登入</button>
            <div style="border-top:1px solid #333; margin-top:10px; padding-top:20px; display:flex; flex-direction:column; gap:10px;">
                <input type="text" id="guest-name-input" placeholder="輸入暱稱...">
                <button class="btn" style="background:#444; color:white;" onclick="enterAsGuest()">遊客登入</button>
            </div>
        </div>
    </div>

    <div id="main-app">
        <div class="sidebar-left">
            <div class="user-panel">
                <div class="panel-title">👥 在線名單</div>
                <div id="user-list" class="scroll-area"></div>
            </div>
            
            <div class="chat-panel">
                <div class="panel-title">💬 玩家對話</div>
                <div id="chat-msgs" class="scroll-area"></div>
                <div style="padding:10px; border-top:1px solid #333; background:#1a1a1a;">
                    <input type="text" id="chat-input" placeholder="發言..." onkeypress="if(event.keyCode==13) sendChat()" style="margin:0;">
                </div>
            </div>
        </div>

        <div class="auction-container">
            <div class="admin-panel" id="admin-box" style="display:none; background:#252525; padding:15px; border-radius:12px; border:1px dashed var(--gold);">
                <input type="text" id="set-name" placeholder="商品名稱">
                <div style="display:flex; gap:5px; margin-top:5px;">
                    <input type="number" id="set-price" placeholder="起標底價">
                    <input type="number" id="set-min-increment" placeholder="最小加價">
                </div>
                <button id="btn-launch" class="btn btn-gold" style="width:100%; margin-top:8px;" onclick="launchAuction()">發布拍賣</button>
                <button id="btn-reset" class="btn" style="width:100%; background:var(--red); color:white; display:none; margin-top:5px;" onclick="resetAuction()">強制結標</button>
            </div>

            <div class="auction-card">
                <h2 id="disp-item-name" style="margin:0; color:var(--gold);">等待開標...</h2>
                <div class="timer" id="disp-timer">00:00</div>
                <div class="price-tag">$ <span id="disp-price">0</span> <span id="disp-unit"></span></div>
                <div id="disp-min-bid" style="font-size:13px; color:#aaa; margin-bottom:10px;">-</div>
                <div style="display:flex; gap:8px;">
                    <input type="number" id="bid-amount" placeholder="金額..." style="flex:1; margin:0;">
                    <button class="btn btn-gold" onclick="submitBid()">出價</button>
                </div>
                <button id="btn-quick-bid" class="btn btn-blue" onclick="quickBid()">一鍵出價</button>
            </div>
        </div>

        <div class="history-panel">
            <div class="panel-title" style="color:var(--green);">📜 成交紀錄</div>
            <div id="history-list" class="scroll-area"></div>
        </div>
    </div>

<script>
    // --- Firebase 配置 ---
    const firebaseConfig = {
  apiKey: "AIzaSyA19M2lU6BCbxtlSOOcYm1Z_tWrsfo2T4s",
  authDomain: "game-ffb82.firebaseapp.com",
  databaseURL: "https://game-ffb82-default-rtdb.firebaseio.com",
  projectId: "game-ffb82",
  storageBucket: "game-ffb82.firebasestorage.app",
  messagingSenderId: "458888690175",
  appId: "1:458888690175:web:c5060beca640700a574fca",
  measurementId: "G-VJ086JK4QN"
};

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();
    
    let userData = { isGuest: true, name: "遊客", uid: null };
    let timerInterval = null;

    const auctionRef = db.ref('current_auction');
    const chatRef = db.ref('messages');
    const usersRef = db.ref('online_users');
    const historyRef = db.ref('auction_history');

    function loginWithGoogle() {
        auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()).then(res => {
            userData = { isGuest: false, name: res.user.displayName, uid: res.user.uid };
            enterApp();
        });
    }

    function enterAsGuest() {
        const name = document.getElementById('guest-name-input').value.trim();
        if(!name) return alert("請輸入暱稱");
        userData = { isGuest: true, name: "(遊客) " + name, uid: 'guest_' + Date.now() };
        enterApp();
    }

    function enterApp() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('main-app').style.display = 'flex';
    
    // 1. 建立一個專屬的在線節點
    const myUserRef = usersRef.push();

    // 2. 當連線狀態改變時觸發
    db.ref(".info/connected").on("value", (snap) => {
        if (snap.val() === true) {
            // 當連線成功時，設定自己的資訊
            myUserRef.set({ 
                name: userData.name, 
                uid: userData.uid,
                loginTime: Date.now() 
            });

            // 重要：設定當「離線」時，自動刪除這個節點
            myUserRef.onDisconnect().remove();
        }
    });

    if (!userData.isGuest) document.getElementById('admin-box').style.display = 'block';
    startSyncing();
}

    function startSyncing() {
        auctionRef.on('value', snap => {
            const data = snap.val(); if(!data) return;
            document.getElementById('disp-item-name').innerText = data.itemName;
            document.getElementById('disp-price').innerText = data.price.toLocaleString();
            document.getElementById('disp-unit').innerText = data.unit || "金幣";
            document.getElementById('disp-timer').innerText = `00:${data.timeLeft < 10 ? '0'+data.timeLeft : data.timeLeft}`;
            const next = data.price + (data.minIncrement || 0);
            document.getElementById('disp-min-bid').innerText = `最低出價：$${next.toLocaleString()}`;
            document.getElementById('btn-quick-bid').innerText = `一鍵加價至 $${next.toLocaleString()}`;
            
            const isPub = (auth.currentUser && auth.currentUser.uid === data.publisherUid);
            document.getElementById('btn-launch').style.display = data.active ? 'none' : 'block';
            document.getElementById('btn-reset').style.display = (data.active && isPub) ? 'block' : 'none';

            if(timerInterval) clearInterval(timerInterval);
            if (data.active && isPub && data.timeLeft > 0) {
                timerInterval = setInterval(() => {
                    auctionRef.child('timeLeft').transaction(t => { if(t <= 1) { finishAuction(data); return 0; } return t - 1; });
                }, 1000);
            }
        });

        chatRef.limitToLast(50).on('child_added', snap => {
            const m = snap.val();
            if(m.role === 'system') {
                document.getElementById('top-broadcast').innerText = `📢 ${m.text}`;
            } else {
                const box = document.getElementById('chat-msgs');
                const div = document.createElement('div');
                div.className = "msg-line";
                div.innerHTML = `<b style="color:${m.role==='guest'?'#888':'#ffcc00'}">${m.name}:</b> ${m.text}`;
                box.appendChild(div);
                box.scrollTop = box.scrollHeight;
            }
        });

        historyRef.limitToLast(50).on('child_added', snap => {
            const h = snap.val();
            const histBox = document.getElementById('history-list');
            const div = document.createElement('div');
            div.className = "history-item";
            div.innerHTML = `🏆 <b>${h.itemName}</b><br>${h.winner} / $${h.price}`;
            histBox.appendChild(div);
            histBox.scrollTop = histBox.scrollHeight;
        });

        usersRef.on('value', snap => {
        const list = document.getElementById('user-list');
        list.innerHTML = ""; // 先清空舊名單
        
        if (!snap.exists()) {
            list.innerHTML = `<div style="padding:10px; color:#666; font-size:12px;">目前無人在此</div>`;
            return;
        }

        snap.forEach(c => {
            const user = c.val();
            const div = document.createElement('div');
            div.style.cssText = "padding:8px; font-size:13px; border-bottom:1px solid #222; display:flex; align-items:center; gap:5px;";
            div.innerHTML = `<span>🟢</span> ${user.name}`;
            list.appendChild(div);
        });
        
        // 自動捲動到名單最上方
        list.scrollTop = 0;
    });
}

    function quickBid() {
        if(userData.isGuest) return alert("遊客無法競標");
        auctionRef.once('value', snap => {
            const d = snap.val();
            executeBid(d.price + (d.minIncrement || 0), d.unit);
        });
    }

    function submitBid() {
        if(userData.isGuest) return alert("遊客無法競標");
        const bid = parseInt(document.getElementById('bid-amount').value);
        auctionRef.once('value', snap => {
            const d = snap.val();
            if(bid >= d.price + (d.minIncrement || 0)) { executeBid(bid, d.unit); document.getElementById('bid-amount').value = ""; }
            else alert("金額不足");
        });
    }

    function executeBid(amt, unit) {
        auctionRef.update({ price: amt, highestBidder: userData.name, timeLeft: 20 });
        chatRef.push({ name: "🔨 競標", text: `${userData.name} 出價 ${amt} ${unit || ''}`, role: 'system' });
    }

    function launchAuction() {
        const name = document.getElementById('set-name').value;
        const price = parseInt(document.getElementById('set-price').value);
        const inc = parseInt(document.getElementById('set-min-increment').value) || 0;
        if(!name || isNaN(price)) return alert("請填寫商品名稱與底價");
        auctionRef.set({ itemName: name, price: price, minIncrement: inc, active: true, timeLeft: 60, publisherUid: userData.uid, highestBidder: "無" });
        chatRef.push({ name: "📢 系統", text: `【${name}】開標！`, role: 'system' });
    }

    function finishAuction(data) {
        auctionRef.update({ active: false });
        const winner = data.highestBidder;
        chatRef.push({ name: "📢 系統", text: winner === "無" ? "流標" : `結標！【${winner}】得標`, role: 'system' });
        if(winner !== "無") historyRef.push({ itemName: data.itemName, winner: winner, price: data.price });
    }

    function resetAuction() { if(confirm("重置？")) auctionRef.update({ active: false, timeLeft: 0 }); }
    function sendChat() {
        const input = document.getElementById('chat-input');
        if(!input.value || userData.isGuest) return;
        chatRef.push({ name: userData.name, text: input.value, role: 'member' });
        input.value = "";
    }
</script>
</body>
</html>
